<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Messages Reader</title>
  <meta name="description" content="A simple, high-performance web-based messages reader designed to view exported chat histories quickly and easily." />
  <meta name="keywords" content="messages, reader, chat history, viewer, telegram, export, fast" />
  <meta name="author" content="SPACESODA" />
  <meta property="og:title" content="Messages Reader" />
  <meta property="og:description" content="A simple, high-performance web-based messages reader designed to view exported chat histories quickly and easily." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://github.com/SPACESODA/msg-reader" />
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --panel: #ffffff;
      --text: #20231f;
      --muted: #6d7468;
      --line: #dfe4d9;
      --accent: #a7e978;
      --accent-strong: #47a85d;
      --accent-line: #8fd66a;
      --accent-soft: #e7f8dc;
      --bubble-text: #111810;
      --ink-soft: #f0f2ee;
      --shadow: 0 18px 50px rgba(30, 37, 28, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .app-header,
    main {
      max-width: 1120px;
      width: calc(100% - 32px);
      margin: 0 auto;
    }

    .app-header {
      position: relative;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      padding: 36px 0 20px;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(2.4rem, 4vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .source-editor {
      position: absolute;
      top: 10px;
      right: 0;
      font-size: 0.85rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .edit-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .edit-btn:hover {
      color: var(--text);
    }

    #sourceForm {
      display: flex;
      gap: 6px;
    }

    #sourceForm input {
      min-height: 28px;
      padding: 0 8px;
      font-size: 0.85rem;
      width: 240px;
    }

    #sourceForm button {
      min-height: 28px;
      padding: 0 12px;
      font-size: 0.85rem;
      background: #fbfcfa;
      border: 1px solid var(--line);
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
    }

    #sourceForm button:hover {
      background: var(--ink-soft);
    }

    .summary {
      color: var(--muted);
      font-size: 0.94rem;
      text-align: right;
      max-width: 360px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(240px, 1.6fr) minmax(170px, 0.85fr) minmax(140px, 0.7fr) auto;
      gap: 12px;
      align-items: end;
      margin: 14px 0 16px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfa;
      color: var(--text);
      font: inherit;
      font-size: 0.95rem;
      padding: 0 12px;
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(31, 122, 92, 0.22);
      border-color: var(--accent);
    }

    #orderButton {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfa;
      color: var(--text);
      font: inherit;
      font-size: 0.95rem;
      padding: 0 12px;
      cursor: pointer;
      transition: opacity 0.3s;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .floating-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 10px 20px;
      border-radius: 20px;
      border: 1px solid #ccc;
      background: white;
      color: black;
      cursor: pointer;
      transition: opacity 0.3s;
      font-weight: bold;
      font-family: inherit;
    }

    #toTopBtn {
      opacity: 0;
      pointer-events: none;
    }

    .checkbox {
      display: flex;
      flex-direction: row;
      align-items: center;
      min-height: 42px;
      gap: 8px;
      padding: 0 10px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfa;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .checkbox input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--accent);
    }

    .checkbox:has(input:checked) {
      border-color: rgba(23, 131, 93, 0.45);
      background: var(--accent-soft);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
    }

    .stat strong {
      display: block;
      font-size: 1.3rem;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .timeline {
      position: relative;
      padding: 0 0 120px;
    }

    .day {
      position: sticky;
      top: 0;
      z-index: 2;
      margin: 22px 0 12px;
      padding: 9px 12px;
      color: var(--muted);
      background: rgba(247, 248, 245, 0.92);
      border-bottom: 1px solid var(--line);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      font-weight: 800;
    }

    .message {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 12px;
      margin: 0 0 12px;
    }

    .rail {
      position: relative;
    }

    .rail::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: -12px;
      left: 13px;
      width: 2px;
      background: var(--line);
    }

    .rail::after {
      content: "";
      position: absolute;
      top: 17px;
      left: 7px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--panel);
      border: 2px solid var(--muted);
    }

    .message.highlighted .rail::after {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
      box-shadow: 0 0 0 4px rgba(23, 131, 93, 0.14);
    }

    .message.highlighted .rail::before {
      background: linear-gradient(180deg, rgba(23, 131, 93, 0.78), rgba(23, 131, 93, 0.78));
    }

    .message-body {
      min-width: 0;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .message.highlighted .message-body {
      color: var(--bubble-text);
      border-color: var(--accent-line);
      background: var(--accent);
      box-shadow: 0 12px 28px rgba(52, 168, 83, 0.18);
    }

    .message-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .sender {
      overflow-wrap: anywhere;
    }

    time {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .message.highlighted time {
      color: rgba(17, 24, 16, 0.66);
    }

    .text {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .meta,
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .meta {
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      color: var(--muted);
      background: var(--ink-soft);
      border-radius: 999px;
      font-size: 0.73rem;
      font-weight: 700;
    }

    .message.highlighted .badge {
      color: #0d4f22;
      background: rgba(255, 255, 255, 0.34);
    }

    .message.highlighted .sender,
    .message.highlighted .text {
      color: var(--bubble-text);
    }

    .empty {
      padding: 36px 16px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.55);
    }

    @media (max-width: 760px) {
      .app-header {
        display: block;
        padding-top: 48px;
      }

      .summary {
        margin-top: 8px;
        text-align: left;
      }

      #sourceForm input {
        width: 100%;
      }

      .controls,
      .stats {
        grid-template-columns: 1fr;
      }

      .message {
        grid-template-columns: 18px minmax(0, 1fr);
        gap: 8px;
      }

      .rail::before {
        left: 8px;
      }

      .rail::after {
        left: 4px;
      }

      .timeline {
        padding: 0 0 120px;
      }

      .message-top {
        display: grid;
        gap: 3px;
      }

      time {
        white-space: normal;
      }
    }
  </style>
</head>

<body>
  <header class="app-header">
    <div id="sourceEditor" class="source-editor">
      <a href="https://github.com/SPACESODA/msg-reader" target="_blank" rel="noopener noreferrer" class="edit-btn">Star on Github</a>
      <button id="editSourceBtn" class="edit-btn">Edit source</button>
      <form id="sourceForm" style="display: none;">
        <input type="text" id="sourceInput" placeholder="URL or path (.js or .json)" />
        <button type="submit">Load</button>
      </form>
    </div>
    <h1>&nbsp;</h1>
    <div class="summary" id="summary" aria-live="polite">Loading...</div>
  </header>

  <main>
    <section class="controls" aria-label="Timeline controls">
      <label class="search">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="Ticker, sender, phrase..." />
      </label>

      <label>
        <span>Sender</span>
        <select id="senderSelect">
          <option value="">All senders</option>
        </select>
      </label>

      <label>
        <span>Order</span>
        <button id="orderButton" type="button">
          <span>Oldest first</span>
        </button>
      </label>

      <label class="checkbox" id="highlightedFilterContainer" style="display: none;">
        <input id="highlightedOnly" type="checkbox" />
        <span id="highlightedLabel">Highlighted</span>
      </label>
    </section>

    <section class="stats" id="stats"></section>
    <section class="timeline" id="timeline" aria-live="polite"></section>
  </main>

  <button id="toBottomBtn" class="floating-btn">To the bottom</button>
  <button id="toTopBtn" class="floating-btn">Back to top</button>

  <template id="messageTemplate">
    <article class="message">
      <div class="rail"></div>
      <div class="message-body">
        <div class="message-top">
          <div>
            <strong class="sender"></strong>
            <span class="badges"></span>
          </div>
          <time></time>
        </div>
        <p class="text"></p>
        <div class="meta"></div>
      </div>
    </article>
  </template>

  <script>
    const state = {
      data: null,
      messages: [],
      highlightedSenders: [],
      filters: {
        query: "",
        sender: "",
        order: "oldest",
        highlightedOnly: false,
      },
    };

    const els = {
      summary: document.querySelector("#summary"),
      stats: document.querySelector("#stats"),
      timeline: document.querySelector("#timeline"),
      search: document.querySelector("#searchInput"),
      sender: document.querySelector("#senderSelect"),
      order: document.querySelector("#orderButton"),
      highlightedOnly: document.querySelector("#highlightedOnly"),
      highlightedLabel: document.querySelector("#highlightedLabel"),
      highlightedFilterContainer: document.querySelector("#highlightedFilterContainer"),
      template: document.querySelector("#messageTemplate"),
      toBottomBtn: document.getElementById("toBottomBtn"),
      toTopBtn: document.getElementById("toTopBtn"),
    };

    const timeFormatter = new Intl.DateTimeFormat("en-CA", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false,
      timeZoneName: "short",
    });

    const dayFormatter = new Intl.DateTimeFormat("en-CA", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
    });

    function matches(message) {
      const query = state.filters.query.trim().toLowerCase();

      if (state.filters.highlightedOnly && !state.highlightedSenders.includes(message._sender)) return false;
      if (state.filters.sender && message._sender !== state.filters.sender) return false;

      if (!query) return true;
      return [
        message.text,
        message._sender,
        String(message.message_id),
        String(message.reply_to || ""),
      ]
        .join(" ")
        .toLowerCase()
        .includes(query);
    }

    function ordered(messages) {
      const direction = state.filters.order === "oldest" ? 1 : -1;
      return [...messages].sort((a, b) => (a._ts - b._ts) * direction);
    }

    function setText(node, value) {
      node.textContent = value == null ? "" : String(value);
    }

    function renderStats(filtered) {
      const uniqueSenders = new Set(filtered.map((message) => message._sender)).size;
      const days = new Set(filtered.map((message) => message._day)).size;

      const cards = [
        ["Messages", filtered.length],
      ];

      if (state.highlightedSenders.length > 0) {
        const highlightedCount = filtered.filter((message) => state.highlightedSenders.includes(message._sender)).length;
        cards.push(["Highlighted", highlightedCount]);
      }

      cards.push(
        ["Senders", uniqueSenders],
        ["Days", days]
      );

      els.stats.style.gridTemplateColumns = `repeat(${cards.length}, 1fr)`;

      els.stats.replaceChildren(
        ...cards.map(([label, value]) => {
          const card = document.createElement("div");
          card.className = "stat";
          const strong = document.createElement("strong");
          const span = document.createElement("span");
          setText(strong, value.toLocaleString());
          setText(span, label);
          card.append(strong, span);
          return card;
        }),
      );
    }

    function badge(text) {
      const item = document.createElement("span");
      item.className = "badge";
      setText(item, text);
      return item;
    }

    function renderMessage(message) {
      const node = els.template.content.firstElementChild.cloneNode(true);
      node.id = `msg-${message.message_id}`;
      node.classList.toggle("highlighted", state.highlightedSenders.includes(message._sender));

      setText(node.querySelector(".sender"), message._sender);
      setText(node.querySelector("time"), message._time);
      node.querySelector("time").dateTime = message.timestamp_iso || "";
      setText(node.querySelector(".text"), message.text);

      const meta = node.querySelector(".meta");
      meta.append(badge(`#${message.message_id}`));
      if (message.reply_to) {
        const replyBtn = document.createElement("a");
        replyBtn.className = "badge";
        replyBtn.textContent = `Reply to #${message.reply_to}`;
        replyBtn.style.cursor = "pointer";
        replyBtn.style.textDecoration = "none";
        replyBtn.style.color = "#666666";
        replyBtn.style.backgroundColor = "var(--ink-soft)";
        replyBtn.onclick = (e) => {
          e.preventDefault();
          const target = document.getElementById(`msg-${message.reply_to}`);
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "center" });
            target.animate([
              { backgroundColor: "rgba(255, 215, 0, 0.3)" },
              { backgroundColor: "transparent" }
            ], { duration: 2000 });
          } else {
            alert("Message not found. It might be filtered out.");
          }
        };
        meta.append(replyBtn);
      }

      return node;
    }

    function renderTimeline() {
      const filtered = ordered(state.messages.filter(matches));
      renderStats(filtered);

      if (!filtered.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        setText(empty, "No messages match the current filters.");
        els.timeline.replaceChildren(empty);
        return;
      }

      const nodes = [];
      let currentDay = "";
      for (const message of filtered) {
        const nextDay = message._day;
        if (nextDay !== currentDay) {
          currentDay = nextDay;
          const day = document.createElement("div");
          day.className = "day";
          setText(day, currentDay);
          nodes.push(day);
        }
        nodes.push(renderMessage(message));
      }

      els.timeline.replaceChildren(...nodes);
    }

    function fillSelects() {
      els.sender.innerHTML = '<option value="">All senders</option>';
      const sendersSet = new Set();
      for (const message of state.messages) {
        sendersSet.add(message._sender);
      }

      const senders = [...sendersSet].sort((a, b) => {
        const aAlpha = /^[a-zA-Z]/.test(a);
        const bAlpha = /^[a-zA-Z]/.test(b);
        if (aAlpha && !bAlpha) return -1;
        if (!aAlpha && bAlpha) return 1;
        return a.localeCompare(b);
      });

      for (const sender of senders) {
        const option = document.createElement("option");
        option.value = sender;
        option.textContent = sender;
        els.sender.append(option);
      }
    }

    function attachEvents() {
      els.search.addEventListener("input", () => {
        state.filters.query = els.search.value;
        renderTimeline();
      });

      els.sender.addEventListener("change", () => {
        state.filters.sender = els.sender.value;
        renderTimeline();
      });

      els.order.addEventListener("click", () => {
        if (state.filters.order === "oldest") {
          state.filters.order = "newest";
          els.order.innerHTML = "<span>Latest first</span>";
        } else {
          state.filters.order = "oldest";
          els.order.innerHTML = "<span>Oldest first</span>";
        }
        renderTimeline();
      });

      els.highlightedOnly.addEventListener("change", () => {
        state.filters.highlightedOnly = els.highlightedOnly.checked;
        renderTimeline();
      });

      let ticking = false;
      window.addEventListener("scroll", () => {
        if (!els.toBottomBtn || !els.toTopBtn) return;

        if (!ticking) {
          window.requestAnimationFrame(() => {
            const scrollBottom = document.documentElement.scrollHeight - window.innerHeight - window.scrollY;
            if (scrollBottom <= 50) {
              els.toBottomBtn.style.opacity = "0";
              els.toBottomBtn.style.pointerEvents = "none";
              els.toTopBtn.style.opacity = "1";
              els.toTopBtn.style.pointerEvents = "auto";
            } else {
              els.toBottomBtn.style.opacity = "1";
              els.toBottomBtn.style.pointerEvents = "auto";
              els.toTopBtn.style.opacity = "0";
              els.toTopBtn.style.pointerEvents = "none";
            }
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });

      els.toBottomBtn?.addEventListener("click", () => {
        window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
      });

      els.toTopBtn?.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    function init() {
      try {
        if (typeof messagesData === "undefined") {
          throw new Error("messagesData is not defined. Ensure messages.js is loaded correctly.");
        }
        state.data = messagesData;

        state.messages = (state.data.messages || []).map(msg => {
          let ts = 0;
          let day = "Unknown date";
          let time = "";
          if (msg.timestamp_iso) {
            ts = Date.parse(msg.timestamp_iso);
            if (!Number.isNaN(ts)) {
              const d = new Date(ts);
              day = dayFormatter.format(d);
              time = timeFormatter.format(d);
            }
          }
          return {
            ...msg,
            _ts: ts,
            _day: day,
            _time: time,
            _sender: msg.sender || "Unknown"
          };
        });

        const title = state.data.title || "Messages";
        document.querySelector("h1").textContent = title;
        document.title = `${title} - Messages Reader`;

        state.highlightedSenders = state.data.highlighted_senders
          ? state.data.highlighted_senders.split(",").map(s => s.trim())
          : [];

        els.highlightedFilterContainer.style.display = state.highlightedSenders.length > 0 ? "flex" : "none";
        els.highlightedOnly.checked = false;
        state.filters.highlightedOnly = false;

        if (state.messages.length === 0) {
          els.summary.textContent = "0 messages";
        } else {
          const first = state.messages[0];
          const last = state.messages[state.messages.length - 1];
          els.summary.textContent = `${state.messages.length.toLocaleString()} messages, from ${first._day} to ${last._day}`;
        }

        fillSelects();
        attachEvents();
        renderTimeline();
      } catch (error) {
        els.summary.textContent = "Could not load messages data";
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = `Error: ${error.message} Please ensure messages.js exists in the same directory and contains the correct data.`;
        els.timeline.replaceChildren(empty);
      }
    }

    const params = new URLSearchParams(window.location.search);
    let sourceUrl = params.get("source");

    if (sourceUrl) {
      localStorage.setItem("msgLastSource", sourceUrl);
    } else {
      sourceUrl = localStorage.getItem("msgLastSource") || "messages.js";
    }

    const editSourceBtn = document.getElementById("editSourceBtn");
    const sourceForm = document.getElementById("sourceForm");
    const sourceInput = document.getElementById("sourceInput");

    editSourceBtn.addEventListener("click", () => {
      editSourceBtn.style.display = "none";
      sourceForm.style.display = "flex";
      sourceInput.value = sourceUrl;
      sourceInput.focus();
    });

    sourceForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const newUrl = sourceInput.value.trim();
      if (newUrl) {
        localStorage.setItem("msgLastSource", newUrl);
        window.location.href = `?source=${encodeURIComponent(newUrl)}`;
      }
    });

    function showError(msg) {
      els.summary.textContent = "Could not load messages data";
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = msg;
      els.timeline.replaceChildren(empty);
    }

    const timestamp = new Date().getTime();
    const noCacheUrl = sourceUrl.includes('?')
      ? `${sourceUrl}&_t=${timestamp}`
      : `${sourceUrl}?_t=${timestamp}`;

    if (sourceUrl.split('?')[0].toLowerCase().endsWith(".json")) {
      fetch(noCacheUrl)
        .then(res => {
          if (!res.ok) throw new Error("HTTP error " + res.status);
          return res.json();
        })
        .then(data => {
          window.messagesData = data;
          init();
        })
        .catch(err => {
          showError(`Error: Failed to load JSON from ${sourceUrl}. ${err.message}`);
        });
    } else {
      const script = document.createElement("script");
      script.src = noCacheUrl;
      script.onload = init;
      script.onerror = () => {
        showError(`Error: Failed to load JS from ${sourceUrl}. Please ensure the file exists and is accessible.`);
      };
      document.head.appendChild(script);
    }
  </script>
</body>
